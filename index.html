<!doctype html>
<html lang="cs">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="mat_cetba.css">

  <title>Maturitní četba SPŠT</title>
  <link rel="icon" type="image/x-icon" href="Icon_reader.png">
</head>

<body>
  <!--cookies (localstorage)-->
  <div id="consent-overlay">
  <div id="consent-popup">
    <div class="consent-content">
      <div class="consent-icon">
        <img src="Icon_cookie.png" alt="Cookie">
      </div>
      <div class="consent-text">
        Povol cookies pro sledování svého progresu!
      </div>
    </div>
    <div class="consent-buttons">
      <button id="btn-deny" class="btn-secondary">Zakázat</button>
      <button id="btn-allow" class="btn-primary">Povolit</button>
    </div>
  </div>
</div>

  <div class="topbar" id="topbar">
     <div class="menu">
          <img src="Icon_checkmark.png" class="icon" id="vypis-button" alt="Vypsání knih">
          <img src="Icon_pdf.png" class="icon" id="pdf-button" alt="pdf" title="Exportovat seznam do PDF">
          <img src="Icon_nightmode.png" class="icon" id="dark-mode-toggle" alt="Dark mode">
          <img src="Icon_eraser.png" class="icon" id="reset-button" alt="guma" title="Vymazat vše">
    </div>
      
      <h1><img src="Icon_reader.png" class="icon" style="margin-right: 6px;" alt="ctenar">Maturitní četba SPŠT</h1>
      <h3>2025/26</h3>
    
      <br>
      <select id="filter-obdobi">
          <option value="vsechna">všechna období</option>
          <option value="Světová a česká lit. do konce 18. století">18. století</option>
          <option value="Světová a česká lit. 19. století">19. století</option>
          <option value="Světová literatura 20. a 21. století">20. a 21. století - světová</option>
          <option value="Česká literatura 20. a 21. století">20. a 21. století - česká</option>
      </select>
      
      <select id="filter-druhy">
          <option value="vsechny">všechny literární druhy</option>
          <option value="poezie">poezie</option>
          <option value="próza">próza</option>
          <option value="drama">drama</option>
      </select>
      
      <select id="filter-stav">
          <option value="vsechny">zobrazit všechny</option>
          <option value="precteno">přečtené</option>
          <option value="rozecteno">rozečtené</option>
          <option value="planuju">plánuji</option>
      </select>
  </div>
    
    <div class="table-container">
    <table>
        <thead>
            <tr>
              <th></th> 
              <th><img src="Icon_star.png" class="status-icon" title="přečteno (k maturitě)" alt="přečteno"></th>
              <th><img src="Icon_halfstar.png" class="status-icon" title="rozečteno" alt="rozečteno"></th>
              <th><img src="Icon_calendar.png" class="status-icon" title="plánuji přečíst" alt="plánuji"></th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>
    </div>

  <!-- to na pravo ten panel-->
    <div class="overview">
      <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <h3 id="pocitadlo" style="color: #d9534f;">Přečteno: 0/20</h3>
      <div class="overview-inner">
        <div class="obdobi">
          <span><b>Období:</b></span><br>
          <span>18. století:</span> <span id="18Precteno"></span><br>
          <span>19. století:</span> <span id="19Precteno"></span><br>
          <span>20. století - světová:</span> <span id="20Precteno_sv"></span><br>
          <span>20. století - česká:</span> <span id="20Precteno_cz"></span><br><br>
        </div>
        <div class="druhy">
          <span><b>Literární druhy:</b></span><br>
          <span>próza: </span> <span id="prozaPrecteno"></span><br>
          <span>poezie: </span> <span id="poeziePrecteno"></span><br>
          <span>drama: </span> <span id="dramaPrecteno"></span><br>
        </div>
      </div>
    </div>

    <script>
    const csvFile = 'data.csv'; 
    let vsechnaData = []; 
    let stavKnih = JSON.parse(localStorage.getItem('stavMaturitniCetby')) || {};

    function aktualizujPocitadlo() {
        const pocetPrectenych = Object.values(stavKnih).filter(v => v === "precteno").length;
        
        document.getElementById('pocitadlo').innerText = `${pocetPrectenych}/20`;
        
        const procenta = (pocetPrectenych / 20) * 100;
        document.getElementById('progress-fill').style.width = procenta + '%';

        if (pocetPrectenych >= 20) {
            document.getElementById('pocitadlo').style.color = "#0056b3"; // modra
        } else {
            document.getElementById('pocitadlo').style.color = "#000"; 
        }
    }

      //reset radiobuttonu (guma)
    document.getElementById('reset-button').addEventListener('click', function() {
    if (confirm("Opravdu chceš smazat veškerý svůj progres v četbě?")) {
        
        stavKnih = {};      
        localStorage.removeItem('stavMaturitniCetby');
        
        vykresliTabulku();
        aktualizujPocitadlo();
        aktualizujStatistiky();
        
        console.log("Data byla vymazána.");
    }
});

    Papa.parse(csvFile, {
        download: true,
        header: true,
        delimiter: ";",
        skipEmptyLines: true,
        trimHeaders: true,
        transform: (val) => val.trim(),
        complete: function(results) {
            vsechnaData = results.data;
            vykresliTabulku();
            aktualizujPocitadlo();
            aktualizujStatistiky();
        }
    });

    function ulozStav(id, hodnota) {
        if (stavKnih[id] === hodnota) {
            delete stavKnih[id];
        } else {
            if (hodnota === "precteno") {
                const pocetPrectenych = Object.values(stavKnih).filter(v => v === "precteno").length;

                if (pocetPrectenych >= 20) {
                    alert("Do maturitního seznamu si můžeš vybrat maximálně 20 knih.");
                    vykresliTabulku();
                    return;
                }
            }
            // kontrola autora
            const autor = vsechnaData.find(row => (row.ID || `${row["Autor"]}-${row["Název díla"]}`) === id)?.["Autor"];
            
            if (autor) {
                const pocetOdAutora = Object.keys(stavKnih).filter(key => {
                    const kniha = vsechnaData.find(r => (r.ID || `${r["Autor"]}-${r["Název díla"]}`) === key);
                    return kniha && kniha["Autor"] === autor && key !== id && stavKnih[key];
                }).length;

                if (pocetOdAutora >= 2) {
                    alert(`Od autora ${autor} už máš vybraná 2 díla.`);
                    vykresliTabulku();
                    return;
                }
            }

            stavKnih[id] = hodnota;
        }

        if (localStorage.getItem('cookieConsent') === 'granted') {
          localStorage.setItem('stavMaturitniCetby', JSON.stringify(stavKnih));
        }
        
        vykresliTabulku();
        aktualizujPocitadlo();
        aktualizujStatistiky();
    }

    aktualizujPocitadlo();

    function aktualizujStatistiky() {
        const stats = {
            "Světová a česká lit. do konce 18. století": 0,
            "Světová a česká lit. 19. století": 0,
            "Světová literatura 20. a 21. století": 0,
            "Česká literatura 20. a 21. století": 0,
            "próza": 0,
            "poezie": 0,
            "drama": 0
        };

        vsechnaData.forEach(row => {
            const idKnihy = row.ID || `${row["Autor"]}-${row["Název díla"]}`;
            const stav = stavKnih[idKnihy];
            const druh = (row["Druh"] || "").toLowerCase().trim();
            const obdobi = (row["Kategorie / Období"] || "").trim();

            if (stav) {
                if (stats.hasOwnProperty(obdobi)) stats[obdobi]++;
                if (stats.hasOwnProperty(druh)) stats[druh]++;
            }
        });
      
        document.getElementById('18Precteno').innerText = `${stats["Světová a česká lit. do konce 18. století"]}/2`;
        document.getElementById('19Precteno').innerText = `${stats["Světová a česká lit. 19. století"]}/3`;
        document.getElementById('20Precteno_sv').innerText = `${stats["Světová literatura 20. a 21. století"]}/4`;
        document.getElementById('20Precteno_cz').innerText = `${stats["Česká literatura 20. a 21. století"]}/5`;
        document.getElementById('prozaPrecteno').innerText = `${stats["próza"]}/2`;
        document.getElementById('poeziePrecteno').innerText = `${stats["poezie"]}/2`;
        document.getElementById('dramaPrecteno').innerText = `${stats["drama"]}/2`;
    }
      
    function vykresliTabulku() {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = ""; 

        const Obdobii = document.getElementById('filter-obdobi').value;
        const Druhh = document.getElementById('filter-druhy').value;
        const Stavv = document.getElementById('filter-stav').value;

        vsechnaData.forEach((row, index) => {
            const idKnihy = row.ID || `kniha-${index}`;
            const aktualniStav = stavKnih[idKnihy] || "";
            
            const druhUprava = (row["Druh"] || "").toLowerCase().trim();
            
            // filtry
            const filtrObdobi = (Obdobii === "vsechna" || row["Kategorie / Období"] === Obdobii);
            const filtrDruh = (Druhh === "vsechny" || druhUprava === Druhh.toLowerCase());
            const filtrStav = (Stavv === "vsechny" || aktualniStav === Stavv);

            if (filtrObdobi && filtrDruh && filtrStav) {
                const tr = document.createElement('tr');
                const zanr = row["Žánr"] || "Nezadáno";
                const pocetStran = row["Počet stran"] || "-";
                const druh = row["Druh"] || "-";
                tr.innerHTML = `
                   <td>
                        <div class="book-row-layout">
                            <span class="book-text"><strong>${row["Autor"]}:</strong> ${row["Název díla"]}</span>
                            
                            <div class="info-tooltip-container">
                                <img src="Icon_info3.png" class="info-icon-img" alt="Info">
                                <div class="tooltip-content">
                                    <strong>Druh:</strong> ${druh}<br>
                                    <strong>Žánr:</strong> ${zanr}<br>
                                    <strong>Počet stran:</strong> ${pocetStran}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td><input type="radio" name="r-${idKnihy}" ${aktualniStav === 'precteno' ? 'checked' : ''} onclick="ulozStav('${idKnihy}', 'precteno')"></td>
                    <td><input type="radio" name="r-${idKnihy}" ${aktualniStav === 'rozecteno' ? 'checked' : ''} onclick="ulozStav('${idKnihy}', 'rozecteno')"></td>
                    <td><input type="radio" name="r-${idKnihy}" ${aktualniStav === 'planuju' ? 'checked' : ''} onclick="ulozStav('${idKnihy}', 'planuju')"></td>
                `;
                tableBody.appendChild(tr);
            }
        });
    }

    document.getElementById('filter-obdobi').addEventListener('change', vykresliTabulku);
    document.getElementById('filter-druhy').addEventListener('change', vykresliTabulku);
    document.getElementById('filter-stav').addEventListener('change', vykresliTabulku);

      
    //vypsani knih
    document.getElementById('vypis-button').addEventListener('click', function() {
    const precteneId = Object.keys(stavKnih).filter(id => stavKnih[id]);

    if (precteneId.length === 0) {
        alert(`Tvůj seznam je prázdný. Pro výpis musíš mít vybraná alespoň nějaká díla.`);
        return;
    }

    const vybraneKnihy = vsechnaData.filter(row => {
        const idKnihy = row.ID || `${row["Autor"]}-${row["Název díla"]}`;
        return precteneId.includes(idKnihy);
    });

    let obsah = `
        <!DOCTYPE html>
        <html lang="cs">
        <head>
            <meta charset="utf-8">
            <title>Maturitní seznam četby - Výpis</title>
            <style>
                body { font-family: "Segoe UI", Arial, sans-serif; padding: 40px; line-height: 1.6; background-color: #fff; color: #333; max-width: 800px; margin: 0 auto;
                }
                .header-container { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 12px; margin-bottom: 30px;
                }
                .btn-zpet { display: inline-flex; align-items: center;gap: 8px; text-decoration: none; color: #555; font-weight: 500; margin-bottom: 20px;transition: color 0.2s ease; cursor: pointer;
                }
                .btn-zpet:hover { color: #000;
                }
                h1 { text-align: center; color: #222; margin: 0; flex-grow: 1; font-size: 28px;
                }
                .header-spacer { width: 120px;
                }
                table { width: 100%;  border-collapse: collapse;  margin-top: 20px; 
                }
                th, td { border: 1px solid #000;  padding: 12px 15px;  text-align: left;  font-size: 15px;
                }
                th { background-color: #f2f2f2;  font-weight: bold;
                }
                .td-cislo { text-align: center; width: 1%; white-space: nowrap;
                }
                .footer { margin-top: 40px;  font-size: 0.95em;  text-align: right;  font-style: italic;  color: #555;
                }
            </style>
        </head>
        <body>
        <div class="header-container">
            <a class="btn-zpet" onclick="window.close();">← Zpět</a>
            <h1>Seznam maturitní četby 2025/2026</h1>
            <div class="header-spacer"></div>
        </div>
            <table>
                <thead>
                    <tr>
                        <th class="td-cislo">č.</th>
                        <th>Autor</th>
                        <th>Název díla</th>
                    </tr>
                </thead>
                <tbody>
    `;

    vybraneKnihy.forEach((kniha, index) => {
        obsah += `
            <tr>
                <td class="td-cislo">${index + 1}.</td>
                <td>${kniha["Autor"]}</td>
                <td>${kniha["Název díla"]}</td>
            </tr>
        `;
    });

    obsah += `
                </tbody>
            </table>
            <div class="footer">
                Celkem děl: ${vybraneKnihy.length} / 20<br>
                Vygenerováno dne: ${new Date().toLocaleDateString('cs-CZ')}
            </div>
        </body>
        </html>
    `;

    const novaKarta = window.open('', '_blank');
    novaKarta.document.write(obsah);
    novaKarta.document.close();
});

      
    //export do pdf
      document.getElementById('pdf-button').addEventListener('click', function() {
    const precteneId = Object.keys(stavKnih).filter(id => stavKnih[id] === "precteno");

    if (precteneId.length !== 20) {
        alert('Pro export finálního PDF musíš mít označeno přesně 20 přečtených děl.');
        return;
    }

    const vybraneKnihy = vsechnaData.filter(row => {
        const idKnihy = row.ID || `${row["Autor"]}-${row["Název díla"]}`;
        return precteneId.includes(idKnihy);
    });

    const element = document.createElement('div');
    element.className = 'light-mode-pdf';
        
    // tiskova sestava (vzhled pdf)
    let obsah = `
        <div style="font-family: 'Segoe UI', Arial, sans-serif; padding: 15px; line-height: 1.2; background-color: #fff !important; color: #000 !important; width: 680px; box-sizing: border-box;">
            <h1 style="text-align: center; color: #333; border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 20px; font-size: 22px;">Seznam maturitní četby 2025/2026</h1>
            
            <table style="width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: auto; background-color: #fff !important;">
                <thead>
                    <tr style="page-break-inside: avoid;">
                        <th style="border: 1px solid #000; padding: 9px 10px; text-align: left; background-color: #f2f2f2 !important; color: #000 !important; width: 1%; font-size: 14px; white-space: nowrap;">č.</th>
                        <th style="border: 1px solid #000; padding: 9px 10px; text-align: left; background-color: #f2f2f2 !important; color: #000 !important; font-size: 14px;">Autor</th>
                        <th style="border: 1px solid #000; padding: 9px 10px; text-align: left; background-color: #f2f2f2 !important; color: #000 !important; font-size: 14px;">Název díla</th>
                    </tr>
                </thead>
                <tbody>
    `;

    vybraneKnihy.forEach((kniha, index) => {
        obsah += `
            <tr style="page-break-inside: avoid;">
                <td style="border: 1px solid #000; padding: 9px 10px; text-align: center; width: 1%; white-space: nowrap; font-size: 14px; color: #000 !important;">${index + 1}.</td>
                <td style="border: 1px solid #000; padding: 9px 10px; text-align: left;">${kniha["Autor"]}</td>
                <td style="border: 1px solid #000; padding: 9px 10px; text-align: left;">${kniha["Název díla"]}</td>
            </tr>
        `;
    });

    obsah += `
                </tbody>
            </table>
            
            <div style="margin-top: 25px; font-size: 13px; text-align: right; font-style: italic; color: #000; padding-right: 5px;">
                Celkem děl: ${vybraneKnihy.length} / 20<br>
                Vygenerováno dne: ${new Date().toLocaleDateString('cs-CZ')}
            </div>
        </div>
    `;
        
    element.innerHTML = obsah;  
        
    const opt = {
        margin:       10,
        filename:     'Maturitni_cetba_export.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:    { mode: 'specify', avoid: 'tr' }
    };

    //stazeni souboru
    html2pdf().set(opt).from(element).save();
});


      //darkmode
   const darkModeToggle = document.getElementById('dark-mode-toggle');
    const body = document.body;

    darkModeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        

        if (body.classList.contains('dark-mode')) {
            darkModeToggle.src = 'Icon_daymode.png'; 
        } else {
            darkModeToggle.src = 'Icon_nightmode.png';
        }
        
        // ulozeni preference do prohlizece
        const isDarkMode = body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDarkMode);
    });

    if (localStorage.getItem('darkMode') === 'true') {
        body.classList.add('dark-mode');
    }


// cookie pupup
const consentOverlay = document.getElementById('consent-overlay');
const btnAllow = document.getElementById('btn-allow');
const btnDeny = document.getElementById('btn-deny');

// kontrola jestli uz souhlasil
window.addEventListener('load', () => {
    const consent = localStorage.getItem('cookieConsent');
    if (!consent) {
        consentOverlay.style.display = 'flex';
    }
});

btnAllow.addEventListener('click', () => {
    localStorage.setItem('cookieConsent', 'granted');
    consentOverlay.style.display = 'none';
});

btnDeny.addEventListener('click', () => {
    localStorage.setItem('cookieConsent', 'denied');
    consentOverlay.style.display = 'none';
    
});

const topbar = document.getElementById("topbar");
const overview = document.getElementById("overview");
window.addEventListener("scroll", () => {

    if (window.scrollY > 40) {
        topbar.classList.add("scrolled");
        overview.classList.add("scrolled");
    }     
    else 
    {
        topbar.classList.remove("scrolled");
        overview.classList.add("scrolled");
    }
});
    </script>

</body>
